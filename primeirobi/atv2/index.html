<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2</title>
</head>
<body>
    <form>
        <h1>Página de Cadastro</h1>
        <fieldset>
            <legend>Crie sua conta</legend>

            <label for="user_name">Nome:</label><br>
            <input type="text" id="user_name" name="nome" required>
            <br><br>

            <label for="user_email">Email:</label><br>
            <input type="email" id="user_email" name="email" placeholder="seuemail@dominio.com" required>
            <br><br>

            <label for="user_password">Senha(mínimo 8 caracteres):</label><br>
            <input type="password" id="user_password" name="senha" minlength="8" required>
            <br><br>

            <h3>Gênero:</h3>
            <input type="radio" id="female" name="gênero">
            <label for="female">Feminino</label><br>
            <input type="radio" id="male" name="gênero"> 
            <label for="male">Masculino</label><br>
            <input type="radio" id="outro" name="gênero">
            <label for="outro">Outro</label>
            <br><br> 

            <label for="user_biografy">Biografia:</label><br>
            <textarea id="user_biografy" name="biografia" placeholder="Fale um pouco sobre você..." rows="4"></textarea>
            <br><br>

            <input type="checkbox" id ="terms" name="termos" required>
            <label for="terms">Eu li e aceito os termos de serviço.</label>
            <br><br>

        </fieldset>
        <br>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>
